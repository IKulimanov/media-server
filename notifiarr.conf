## Notifiarr Client Configuration File
##
## Этот файл размещается в: /data/configs/notifiarr/notifiarr.conf
## После первого запуска контейнера — войди на http://localhost:5454
## и настрой интеграции через веб-интерфейс.
##
## Получить API ключ: зарегистрируйся на https://notifiarr.com (бесплатно)
## Там же настраивается Telegram-интеграция (Discord также поддерживается).

## API ключ с notifiarr.com
## Обязательное поле
api_key = "YOUR_NOTIFIARR_API_KEY_HERE"

## Уровень логирования: debug, info, warn, error
log_level = "info"

## Порт веб-интерфейса
ui_password = ""  # оставь пустым для доступа без пароля в локальной сети

## Интервал отправки данных на notifiarr.com (в секундах)
## 0 = отключить авто-отправку, только по событиям
snapshot_interval = 0

[sonarr]
  [[sonarr.instance]]
  url     = "http://sonarr:8989"
  api_key = ""   # заполняется после старта Sonarr: Settings → General → API Key

[radarr]
  [[radarr.instance]]
  url     = "http://radarr:7878"
  api_key = ""   # заполняется после старта Radarr: Settings → General → API Key

[prowlarr]
  [[prowlarr.instance]]
  url     = "http://prowlarr:9696"
  api_key = ""   # заполняется после старта Prowlarr

[qbit]
  [[qbit.instance]]
  url      = "http://qbittorrent:8080"
  user     = "admin"
  password = ""  # пароль из `docker logs qbittorrent` при первом запуске
